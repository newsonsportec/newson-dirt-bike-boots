<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Dirt Bike Boots</title>

  <meta
    name="description"
    content="Newson Sportec future dirt bike boots. Ride protected. Ride styled. Designed for protection, comfort, control, and modern motocross performance."
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #050505;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #ffffff;
      overflow-x: auto;
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: auto;
      padding-bottom: 90px;
    }

    /*
      150% = 1.5 times bigger
    */
    .website-image {
      width: 150%;
      max-width: none;
      height: auto;
      display: block;
    }

    .floating-buttons {
      position: fixed;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .contact-button {
      text-decoration: none;
      background: #ff6a00;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      transition: 0.25s ease;
      text-align: center;
    }

    .contact-button:hover {
      background: #ff8533;
      transform: translateY(-2px);
    }

    .social-floating {
      display: flex;
      gap: 10px;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
    }

    .social-floating a,
    .footer-social a {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      transition: 0.25s ease;
    }

    .social-floating a:hover,
    .footer-social a:hover {
      background: #ff6a00;
      border-color: #ff6a00;
      transform: translateY(-2px);
    }

    .footer-social {
      position: fixed;
      left: 24px;
      bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
    }

    .footer-social span {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      margin-right: 4px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .website-image {
        width: 150%;
        max-width: none;
      }

      .floating-buttons {
        right: 14px;
        bottom: 14px;
      }

      .contact-button {
        padding: 10px 14px;
        font-size: 12px;
      }

      .social-floating a,
      .footer-social a {
        width: 34px;
        height: 34px;
        font-size: 12px;
      }

      .footer-social {
        left: 14px;
        bottom: 14px;
        padding: 8px 10px;
      }

      .footer-social span {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <img
