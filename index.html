<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Dirt Bike Boots</title>

  <meta
    name="description"
    content="Newson Sportec future dirt bike boots. Ride protected. Ride styled. Designed for protection, comfort, control, and modern motocross performance."
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #050505;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #ffffff;
      overflow-x: auto;
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: auto;
    }

    /*
      This makes the website image 1.5 times bigger.
      100% = normal size
      150% = 1.5 times bigger
    */
    .website-image {
      width: 150%;
      max-width: none;
      height: auto;
      display: block;
    }

    .floating-buttons {
      position: fixed;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .floating-buttons a {
      text-decoration: none;
      background: #ff6a00;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      transition: 0.25s ease;
    }

    .floating-buttons a:hover {
      background: #ff8533;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .website-image {
        width: 150%;
        max-width: none;
      }

      .floating-buttons {
        right: 14px;
        bottom: 14px;
      }

      .floating-buttons a {
        padding: 10px 14px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <img
      src="boots-homepage.png"
      alt="Newson Sportec dirt bike boots website design showing Ride Protected, Ride Styled, color choices, rider benefits, and product features."
      class="website-image"
    />
  </main>

  <div class="floating-buttons">
    <a href="mailto:newsonsportec@gmail.com?subject=Newson Sportec Dirt Bike Boots Inquiry">
      Contact Us
    </a>
  </div>
</body>
</html>
