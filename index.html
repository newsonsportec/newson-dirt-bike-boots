<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Dirt Bike Boots</title>

  <meta
    name="description"
    content="Newson Sportec future dirt bike boots. Ride protected. Ride styled. Designed for protection, comfort, control, and modern motocross performance."
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #050505;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #ffffff;
      overflow-x: auto;
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: auto;
      padding-bottom: 260px;
    }

    /*
      Website image size:
      150% = 1.5 times bigger
    */
    .website-image {
      width: 150%;
      max-width: none;
      height: auto;
      display: block;
    }

    /*
      Bottom-right Contact Us + social icons
    */
    .floating-buttons {
      position: fixed;
      right: 32px;
      bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 20;
    }

    /*
      Contact Us button:
      Original was about 12px x 18px padding.
      This version is about 3 times bigger.
    */
    .contact-button {
      text-decoration: none;
      background: #ff6a00;
      color: #ffffff;
      padding: 36px 54px;
      border-radius: 16px;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
      transition: 0.25s ease;
      text-align: center;
      line-height: 1;
      white-space: nowrap;
    }

    .contact-button:hover {
      background: #ff8533;
      transform: translateY(-4px);
    }

    /*
      Social icon groups
    */
    .social-floating {
      display: flex;
      gap: 18px;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      padding: 22px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
    }

    .footer-social {
      position: fixed;
      left: 32px;
      bottom: 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.78);
      padding: 22px 28px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
    }

    .footer-social span {
      font-size: 30px;
      font-weight: 800;
      color: #ffffff;
      margin-right: 10px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    /*
      Icons:
      Original was 38px.
      This version is about 3 times bigger.
    */
    .social-floating a,
    .footer-social a {
      width: 114px;
      height: 114px;
      border-radius: 50%;
      background: #111111;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 38px;
      font-weight: 900;
      transition: 0.25s ease;
      line-height: 1;
    }

    .social-floating a:hover,
    .footer-social a:hover {
      background: #ff6a00;
      border-color: #ff6a00;
      transform: translateY(-4px);
    }

    /*
      Individual brand color hover effects
    */
    .facebook:hover {
      background: #1877f2 !important;
      border-color: #1877f2 !important;
    }

    .linkedin:hover {
      background: #0a66c2 !important;
      border-color: #0a66c2 !important;
    }

    .x-twitter:hover {
      background: #000000 !important;
      border-color: #ffffff !important;
    }

    .pinterest:hover {
      background: #e60023 !important;
      border-color: #e60023 !important;
    }

    .instagram:hover {
      background: #e4405f !important;
      border-color: #e4405f !important;
    }

    @media (max-width: 768px) {
      .website-image {
        width: 150%;
        max-width: none;
      }

      .page-wrapper {
        padding-bottom: 220px;
      }

      .floating-buttons {
        right: 14px;
        bottom: 14px;
        gap: 14px;
      }

      .contact-button {
        padding: 24px 32px;
        font-size: 28px;
        border-radius: 12px;
      }

      .social-floating {
        gap: 10px;
        padding: 14px;
        border-radius: 14px;
      }

      .social-floating a,
      .footer-social a {
        width: 70px;
        height: 70px;
        font-size: 24px;
      }

      .footer-social {
        left: 14px;
        bottom: 14px;
        gap: 10px;
        padding: 14px;
        border-radius: 14px;
      }

      .footer-social span {
        display: none;
      }
    }
  </style>
</head>
